name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: SublimeText/UnitTesting/actions/setup@v1
        with:
          package-name: LLM
          sublime-text-version: 4
      - uses: SublimeText/UnitTesting/actions/run-tests@v1
        with:
          package-name: LLM
